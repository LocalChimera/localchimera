name: Test APK on Firebase Test Lab

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  firebase-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest release APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTH="Authorization: token $GH_TOKEN"
          APK_URL=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LocalChimera/localchimera/releases?per_page=20" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          withAssets = [r for r in data if r.get('assets')]
          withAssets.sort(key=lambda r: r['created_at'], reverse=True)
          for rel in withAssets:
            for a in rel['assets']:
              if 'arm64' in a['name'].lower() and a['name'].endswith('.apk') and 'debug' not in a['name'].lower():
                print(a['browser_download_url'])
                sys.exit(0)
          ")
          echo "Downloading APK from: $APK_URL"
          curl -s -L -H "$AUTH" -o chimera.apk "$APK_URL"
          echo "Downloaded APK:"
          ls -lh chimera.apk

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Firebase Test Lab (physical device)
        run: |
          gcloud firebase test android run \
            --type robo \
            --app chimera.apk \
            --device model=oriole,version=33,locale=en,orientation=portrait \
            --timeout 5m \
            --results-dir=run_${{ github.run_id }} \
            2>&1 | tee testlab-output.txt

      - name: Upload Test Lab results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-testlab-results
          path: testlab-output.txt
          if-no-files-found: ignore
