# Docs: https://github.com/cashubtc/orchard

[mint]
url = "http://localhost:3338"
name = "Chimera-Cashu-Mint"
description = "QVAC-Chimera self-hosted Cashu eCash mint"
contact = "npub1f60vyl802rs2nt8n3lrw89jq9xt6rqzuw8ddxz0vwdqwm8v3xk5sgj9aef"
nuts = ["nut-04", "nut-05"]
